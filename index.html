<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll: Your Opinion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="voteForm" class="poll-form">
            <h2>Vote in our Poll</h2>
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required autocomplete="off">
            
            <div class="question-section">
                <p class="question-title">Which is your favorite web framework?</p>
                <label><input type="radio" name="option" value="React" required> React</label>
                <label><input type="radio" name="option" value="Vue"> Vue</label>
                <label><input type="radio" name="option" value="Angular"> Angular</label>
                <label><input type="radio" name="option" value="Svelte"> Svelte</label>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div id="thankYou" class="thank-you" style="display:none;">
            <h2>Thank you for voting! 🎉</h2>
            <p><a href="/">Vote again</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
